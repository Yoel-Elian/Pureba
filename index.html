<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Efraín Pursuquia</title>
    <!-- Fuente Inter: Muy usada en tecnología por su legibilidad -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primario: #111111;
            --secundario: #666666;
            --fondo: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--fondo);
            color: var(--primario);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Teléfono en la esquina (Desktop) */
        .telefono {
            position: absolute;
            top: 40px;
            right: 50px;
            font-size: 0.9rem;
            color: var(--secundario);
            font-weight: 400;
        }

        /* Contenido Central */
        .container {
            text-align: center;
            max-width: 500px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .dni-info {
            font-size: 1.1rem;
            color: var(--secundario);
            margin-bottom: 30px;
        }

        .btn-contacto {
            display: inline-block;
            padding: 12px 30px;
            background-color: var(--primario);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-contacto:hover {
            opacity: 0.8;
        }

        /* --- MODO CELULAR --- */
        @media (max-width: 600px) {
            body {
                flex-direction: column;
                justify-content: center;
            }

            .telefono {
                position: static; /* Quita el teléfono de la esquina */
                margin-bottom: 40px; /* Lo separa del resto hacia abajo */
                font-size: 1rem;
                text-align: center;
            }

            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="telefono">
        +54 11 0000-0000 <!-- Reemplazalo por tu número real -->
    </div>

    <div class="container">
        <h1>Hola, soy Efraín Pursuquia</h1>
        <p class="dni-info">DNI: 49.201.838</p>
        
        <a href="mailto:tu-email@ejemplo.com" class="btn-contacto">ENVIAR MENSAJE</a>
    </div>

</body>
</html>
